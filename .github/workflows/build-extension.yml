name: Build & Release Extension

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Lint check
      run: |
        npm install -g eslint
        npx eslint modules/ background.js content.js --rule 'no-undef: off' --rule 'no-unused-vars: off' || true

    - name: Build extension
      run: node build.js

    - name: Extract version
      id: version
      run: |
        VERSION=$(node -p "require('./manifest.json').version")
        echo "current_version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Upload Extension Package
      uses: actions/upload-artifact@v4
      with:
        name: sticky-notes-v${{ steps.version.outputs.current_version }}
        path: build/sticky-notes-v${{ steps.version.outputs.current_version }}.zip
        retention-days: 7

    # ── Bump, tag, and release (only on push to main) ──
    - name: Bump version and tag
      if: github.event_name == 'push'
      id: bump
      run: |
        CURRENT_VERSION=${{ steps.version.outputs.current_version }}
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
        NEW_PATCH=$((PATCH + 1))
        NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

        # Update manifest.json with new version
        node -e "
          const fs = require('fs');
          const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
          m.version = '$NEW_VERSION';
          fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
        "

        # Commit, tag, and push
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add manifest.json
        git commit -m "Bump version to $NEW_VERSION"
        git tag -a "v$NEW_VERSION" -m "Version $NEW_VERSION"
        git push origin HEAD:${{ github.ref_name }}
        git push origin "v$NEW_VERSION"

    - name: Create GitHub Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.bump.outputs.new_version }}
        name: v${{ steps.bump.outputs.new_version }}
        body: |
          Sticky Notes Chrome Extension v${{ steps.bump.outputs.new_version }}
        files: build/sticky-notes-v${{ steps.version.outputs.current_version }}.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish to Chrome Web Store ──
  publish-webstore:
    needs: build
    if: github.event_name == 'push' && vars.CHROME_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build extension
      run: node build.js

    - name: Extract current version
      id: version
      run: |
        CURRENT_VERSION=$(node -p "require('./manifest.json').version")
        echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

    - name: Publish to Chrome Web Store
      uses: mtruessel/chrome-webstore-upload-action@v2
      with:
        file-path: build/sticky-notes-v${{ steps.version.outputs.current_version }}.zip
        extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
        client-id: ${{ secrets.CHROME_CLIENT_ID }}
        client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
        refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
        publish: true