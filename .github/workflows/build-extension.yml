name: Build & Release Extension

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Lint check
      run: |
        npm install -g eslint
        npx eslint modules/ background.js content.js --rule 'no-undef: off' --rule 'no-unused-vars: off' || true

    # ── Version bump FIRST (only on push to main) ──
    - name: Bump version
      if: github.event_name == 'push'
      id: bump
      run: |
        CURRENT_VERSION=$(grep -oP '"version": "\K[^"]+' manifest.json)
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
        NEW_PATCH=$((PATCH + 1))
        NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
        sed -i "s/\"version\": \"$CURRENT_VERSION\"/\"version\": \"$NEW_VERSION\"/" manifest.json
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "Bumped $CURRENT_VERSION → $NEW_VERSION"

    # ── Build AFTER bump (so artifact has correct version) ──
    - name: Build extension
      run: node build.js

    - name: Extract version
      id: version
      run: |
        VERSION=$(grep -oP '"version": "\K[^"]+' manifest.json)
        echo "current_version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Upload Extension Package
      uses: actions/upload-artifact@v4
      with:
        name: sticky-notes-v${{ steps.version.outputs.current_version }}
        path: build/sticky-notes-v${{ steps.version.outputs.current_version }}.zip
        retention-days: 7

    # ── Tag & Release (uses the NEW version) ──
    - name: Commit bump and tag
      if: github.event_name == 'push'
      run: |
        VERSION=${{ steps.version.outputs.current_version }}
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add manifest.json
        git commit -m "Bump version to $VERSION"
        git tag -a "v$VERSION" -m "Version $VERSION"
        git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:${GITHUB_REF#refs/heads/}
        git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" "v$VERSION"

    - name: Create GitHub Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.current_version }}
        name: v${{ steps.version.outputs.current_version }}
        body: |
          Sticky Notes Chrome Extension v${{ steps.version.outputs.current_version }}
        files: build/sticky-notes-v${{ steps.version.outputs.current_version }}.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish to Chrome Web Store ──
  publish-webstore:
    needs: build
    if: github.event_name == 'push' && vars.CHROME_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build extension
      run: node build.js

    - name: Extract current version
      id: version
      run: |
        CURRENT_VERSION=$(grep -oP '"version": "\K[^"]+' manifest.json)
        echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

    - name: Publish to Chrome Web Store
      uses: mtruessel/chrome-webstore-upload-action@v2
      with:
        file-path: build/sticky-notes-v${{ steps.version.outputs.current_version }}.zip
        extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
        client-id: ${{ secrets.CHROME_CLIENT_ID }}
        client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
        refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
        publish: true
