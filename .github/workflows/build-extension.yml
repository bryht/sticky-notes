name: Build & Release Extension

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build extension
      run: node build.js

    - name: Extract current version
      id: version
      run: |
        CURRENT_VERSION=$(grep -oP '"version": "\K[^"]+' manifest.json)
        echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
        echo "Current version: $CURRENT_VERSION"

    - name: Upload Extension Package
      uses: actions/upload-artifact@v4
      with:
        name: sticky-notes-v${{ steps.version.outputs.current_version }}
        path: build/sticky-notes-v${{ steps.version.outputs.current_version }}.zip
        retention-days: 7

    # ── Bump & Release (only on push to main, not PRs) ──

    - name: Bump version and tag
      if: github.event_name == 'push'
      run: |
        CURRENT_VERSION=${{ steps.version.outputs.current_version }}
        IFS='.' read -r -a VERSION_PARTS <<< "$CURRENT_VERSION"
        MAJOR=${VERSION_PARTS[0]}
        MINOR=${VERSION_PARTS[1]}
        PATCH=${VERSION_PARTS[2]}
        NEW_PATCH=$((PATCH + 1))
        NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"

        sed -i "s/\"version\": \"$CURRENT_VERSION\"/\"version\": \"$NEW_VERSION\"/" manifest.json

        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add manifest.json
        git commit -m "Bump version to $NEW_VERSION"
        git tag -a "v$NEW_VERSION" -m "Version $NEW_VERSION"
        git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:${GITHUB_REF#refs/heads/}
        git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" "v$NEW_VERSION"

    - name: Create GitHub Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.current_version }}
        name: v${{ steps.version.outputs.current_version }}
        body: |
          Sticky Notes Chrome Extension v${{ steps.version.outputs.current_version }}
        files: build/sticky-notes-v${{ steps.version.outputs.current_version }}.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ── Publish to Chrome Web Store (only when secrets are configured) ──

    - name: Publish to Chrome Web Store
      if: github.event_name == 'push' && env.CHROME_CLIENT_ID != ''
      uses: mtruessel/chrome-webstore-upload-action@v2
      with:
        file-path: build/sticky-notes-v${{ steps.version.outputs.current_version }}.zip
        extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
        client-id: ${{ secrets.CHROME_CLIENT_ID }}
        client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
        refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
        publish: true
      env:
        CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}