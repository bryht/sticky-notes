name: Build Chrome Extension

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Create build directory
      run: mkdir -p build

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

    - name: Extract and update version
      id: version
      run: |
        # Extract current version from manifest.json
        CURRENT_VERSION=$(grep -oP '"version": "\K[^"]+' manifest.json)
        
        # Split version into components
        IFS='.' read -r -a VERSION_PARTS <<< "$CURRENT_VERSION"
        MAJOR=${VERSION_PARTS[0]}
        MINOR=${VERSION_PARTS[1]}
        
        # Increment minor version
        NEW_MINOR=$((MINOR + 1))
        NEW_VERSION="$MAJOR.$NEW_MINOR.${{ github.run_number }}"
        
        # Update manifest.json with new version
        sed -i "s/\"version\": \"$CURRENT_VERSION\"/\"version\": \"$NEW_VERSION\"/" manifest.json
        
        # Set output variables
        echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "New version: $NEW_VERSION"

    - name: Package Extension
      run: |
        cd ${{ github.workspace }}
        # Create a temporary directory for files to be zipped
        mkdir -p temp_zip_dir
        # Copy all necessary files to the temp directory (flat structure)
        cp manifest.json background.js contentScript.js temp_zip_dir/
        cp -r icons temp_zip_dir/
        # Create zip from the temp directory (now all files will be at root)
        cd temp_zip_dir
        zip -r ../build/sticky-notes-v${{ steps.version.outputs.new_version }}.zip .
        # Clean up
        cd ..
        rm -rf temp_zip_dir

    - name: Upload Extension Package
      uses: actions/upload-artifact@v4
      with:
        name: sticky-notes-v${{ steps.version.outputs.new_version }}
        path: build/sticky-notes-v${{ steps.version.outputs.new_version }}.zip
        retention-days: 7
        
    - name: Create version tag
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add manifest.json
        git commit -m "Bump version to ${{ steps.version.outputs.new_version }}"
        git tag -a v${{ steps.version.outputs.new_version }} -m "Version ${{ steps.version.outputs.new_version }}"
        git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:${GITHUB_REF#refs/heads/}
        git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" v${{ steps.version.outputs.new_version }}
        
    - name: Generate commit history
      id: commit_history
      run: |
        # Get commits since the last tag or a reasonable number of commits if no tag exists
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 --always 2>/dev/null || echo "")
        if [ -n "$PREVIOUS_TAG" ]; then
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s (%an)" $PREVIOUS_TAG..HEAD >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        else
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s (%an)" -n 10 >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        fi
        
    - name: Create GitHub Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.new_version }}
        name: v${{ steps.version.outputs.new_version }}
        body: |
          Sticky Notes Chrome Extension v${{ steps.version.outputs.new_version }}
          
          Release date: ${{ steps.date.outputs.date }}
          
          ${{ steps.commit_history.outputs.changelog }}
        files: build/sticky-notes-v${{ steps.version.outputs.new_version }}.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}